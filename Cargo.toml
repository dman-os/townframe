  "./src/big_repo/",
  "./src/daybook_cli",
  "./src/daybook_core",
  "./src/daybook_ffi",
  # "./src/daybook_fuse",
  "./src/daybook_pdk",
  "./src/daybook_types",
  "./src/daybook_wflows/",
  # "./src/daybook_willow/",
  "./src/macros",
  "./src/mltools/",
  "./src/pauperfuse/",
  "./src/plug_dayledger/",
  "./src/plug_plabels/",
  "./src/plug_test/",
  "./src/test_wflows",
  "./src/utils_rs",
  "./src/wash_plugin_mltools/",
  "./src/wash_plugin_utils/",
  "./src/wash_plugin_wflow/",
