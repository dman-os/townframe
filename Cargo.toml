uuid = { version = "1", features = ["serde"] }
once_cell = "1"
parking_lot = "0.12"
bytes = "1"
url = "2.5.7"
addr = "0.15.6"
scopeguard = "1.2.0"
semver = { version = "1", features = ["serde"] }
surelock = "0.1"

#
