[package]
name = "plug_test"
version.workspace = true
edition.workspace = true

[lints]
workspace = true

[lib]
path = "lib.rs"
crate-type = ["cdylib", "rlib"]

[[bin]]
name = "manifest"
path = "manifest.rs"

[dependencies]
api_utils_rs = { workspace = true }
daybook_pdk = { workspace = true }
daybook_types = { workspace = true, features = ["automerge", "manifest", "wit", "schemars"] }
serde.workspace = true
serde_json.workspace = true
schemars = { version = "1.2", features = ["url2"] }
wflow_sdk = { workspace = true }
wit-bindgen = { workspace = true }
color-eyre.workspace = true
