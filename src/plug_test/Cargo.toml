[package]
name = "plug_test"
version.workspace = true
edition.workspace = true

[lints]
workspace = true

[lib]
path = "lib.rs"
crate-type = ["cdylib", "rlib"]

[[bin]]
name = "manifest"
path = "manifest.rs"

[dependencies]
#
# internal
utils_rs.workspace = true
api_utils_rs = { workspace = true }
daybook_pdk = { workspace = true }
daybook_types = { workspace = true, features = ["automerge", "manifest", "wit", "schemars"] }
wflow_sdk = { workspace = true }

#
# encoding
serde.workspace = true
serde_json.workspace = true

#
# schema
schemars = { version = "1.2", features = ["url2"] }

#
# wit
wit-bindgen = { workspace = true }

[dev-dependencies]
daybook_core = { workspace = true, features = ["test-support"] }
tokio = { workspace = true }
sqlx = { workspace = true }
utils_rs = { workspace = true }
api_utils_rs = { workspace = true }
