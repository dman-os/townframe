[package]
name = "plug_plabels"
version.workspace = true
edition.workspace = true

[package.metadata.cargo-machete]
ignored = ["serde", "color-eyre"]

[lints]
workspace = true

[lib]
crate-type = ["cdylib", "rlib"]
path = "lib.rs"

[[bin]]
name = "manifest"
path = "manifest.rs"

[dependencies]
#
# internal
utils_rs = { workspace = true }
api_utils_rs.workspace = true
am_utils_rs.workspace = true
wflow_sdk.workspace = true
daybook_types = { workspace = true, features = ["wit", "manifest", "schemars"] }

# genai = "0.4.1"
# llm = "1.3.4"

#
# encoding
serde.workspace = true
serde_json.workspace = true

#
# wit
wit-bindgen.workspace = true

#
# schema
schemars = { version = "1.2", features = [
    "uuid1",
    "semver1",
    "url2",
    "jiff02",
    "indexmap2",
] }

#
# error
color-eyre.workspace = true

[dev-dependencies]
daybook_core = { workspace = true, features = ["test-support"] }
