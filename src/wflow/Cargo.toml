[package]
name = "wflow"
version.workspace = true
edition.workspace = true

[lints]
workspace = true

[lib]
path = "lib.rs"

[features]
default = ["test-harness"]
test-harness = ["wasmtime", "insta", "tempfile"]

[dependencies]
#
# internal
wflow_core = { workspace = true, features = ["test-harness"] }
wflow_tokio.workspace = true
wash_plugin_wflow.workspace = true
utils_rs = { workspace = true, features = ["hash"] }
sqlx_utils_rs.workspace = true

#
# encoding
serde_json.workspace = true

#
# error
anyhow.workspace = true

#
# async
async-trait.workspace = true
tokio = { workspace = true, features = ["rt-multi-thread", "sync", "macros", "fs", "tracing"] }
futures.workspace = true

#
# db
sqlx = { workspace = true, features = ["sqlite"] }

#
# wasm
wash-runtime.workspace = true
wasmtime = { workspace = true, optional = true }

#
# testing
insta = { workspace = true, optional = true, features = ["json"] }
tempfile = { workspace = true, optional = true }

#
# log
tracing.workspace = true

[dev-dependencies]
#
# testing
insta = { workspace = true, features = ["json"] }
tempfile.workspace = true

#
# wasm
wasmtime.workspace = true
