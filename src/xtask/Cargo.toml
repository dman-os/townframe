[package]
name = "xtask"
version.workspace = true
edition.workspace = true

[lints]
workspace = true

[[bin]]
name = "xtask"
path = "main.rs"

[dependencies]
clap = { workspace = true, features = ["derive", "env"] }

dotenv-flow.workspace = true

utils_rs = { workspace = true, features = ["native", "hash"] }
daybook_types = { workspace = true, features = ["automerge", "schemars", "manifest"] }

tokio = { workspace = true, features = ["rt-multi-thread", "fs", "time", "tracing", "process"] }
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
futures = { workspace = true }
http.workspace = true

# generator
heck = "0.5.0"
bon.workspace = true
indenter = "0.3.4"

data-encoding.workspace = true
oci-spec = "0.8.4"
oci-wasm = { version = "0.3.0", default-features = false, features = ["rustls-tls"] }
sha2 = "0.10.9"
zstd.workspace = true
url.workspace = true
