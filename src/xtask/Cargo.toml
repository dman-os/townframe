[package]
name = "xtask"
version.workspace = true
edition.workspace = true

[lints]
workspace = true

[[bin]]
name = "xtask"
path = "main.rs"

[dependencies]
clap = { workspace = true, features = ["derive", "env"] }

dotenv-flow.workspace = true

utils_rs = { workspace = true, features = ["native", "hash"] }
daybook_types = { workspace = true, features = ["schemars", "manifest"] }

tokio = { workspace = true, features = ["rt-multi-thread", "fs", "time", "tracing", "process"] }
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
http.workspace = true
future_form.workspace = true
ed25519-dalek = "2.2.0"
keyhive_core = "0.4.0"
keyhive_crypto = "0.2.0"
nonempty = "0.10.0"
rand08 = { package = "rand", version = "0.8.5" }
sedimentree_core.workspace = true
subduction_core.workspace = true
subduction_crypto.workspace = true
subduction_keyhive = { workspace = true, features = ["handler", "test-utils"] }

# generator
heck = "0.5.0"
bon.workspace = true
indenter = "0.3.4"

data-encoding.workspace = true
oci-spec = "0.8.4"
oci-wasm = { version = "0.3.0", default-features = false, features = ["rustls-tls"] }
sha2 = "0.10.9"
url.workspace = true
